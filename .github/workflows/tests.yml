name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          tools: composer:v2
          coverage: none

      - name: Install npm dependencies
        run: npm ci

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Start wp-env
        run: npx wp-env start

      - name: Wait for database
        run: |
          for i in 1 2 3 4 5; do
            npx wp-env run tests-cli wp db check 2>/dev/null && break
            echo "Waiting for database... attempt $i"
            sleep 3
          done

      - name: Run tests
        run: npx wp-env run tests-cli --env-cwd=wp-content/plugins/botvisibility-wp vendor/bin/phpunit
